services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: trace
      POSTGRES_PASSWORD: trace
      POSTGRES_DB: trace
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trace"]
      interval: 5s
      timeout: 5s
      retries: 5

  docling:
    image: ds4sd/docling-serve:latest
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      docling:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://trace:trace@postgres:5432/trace
      DOCLING_URL: http://docling:5001
    env_file:
      - .env
    ports:
      - "8501:8501"

volumes:
  pgdata:
